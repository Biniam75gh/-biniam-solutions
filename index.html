<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BGE - Smart Repair</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; background: #F2F4F7; }
        .hero { background: #0D1B2A; color: white; padding: 20px; text-align: center; }
        .profile-img { width: 100%; max-width: 300px; border-radius: 10px; }

        .services-grid { display: flex; flex-wrap: wrap; justify-content: space-between; padding: 15px; }
        .service-card { background: white; width: 45%; padding: 20px; margin-bottom: 10px; text-align: center; border: 1px solid #ddd; border-radius: 10px; text-decoration: none; color: black; font-weight: bold; }
    </style>
</head>
<body>
    <div class="hero">
        <h1>BGE</h1>
        <img class="profile-img" src="technician.jpg" alt="BGE Technician">
        <p>We Repair, You Relax!</p>
        <a href="tel:0918427112" class="call-btn">CALL NOW</a>
    </div>

    <div class="services-grid">
        <a href="tv-service.html" class="service-card">
            <i class="fa-solid fa-tv"></i><br>TV
        </a>
        <a href="fridge-service.html" class="service-card">
            <i class="fa-solid fa-snowflake"></i><br>Fridge
        </a>
        <a href="laundry-service.html" class="service-card">
            <i class="fa-solid fa-soap"></i><br>Laundry
        </a>
        <a href="solar-service.html" class="service-card">
            <i class="fa-solid fa-solar-panel"></i><br>Solar
        </a>
    </div>

</html>
